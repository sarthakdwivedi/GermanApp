<!DOCTYPE html>
<html lang="de">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Wortschatz</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%230f0e11'/><text x='50' y='72' font-size='65' font-family='serif' font-weight='600' fill='%23b47fff' text-anchor='middle'>W</text></svg>">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="styles.css">

  <link rel="stylesheet" href="quiz.css">
</head>

<body>

  <!-- Loading state -->
  <div id="loading">
    <div class="spinner"></div>
    <div>Loading words…</div>
  </div>

  <!-- App (hidden until data loads) -->
  <div id="app">

    <div class="header">
      <div class="logo">Wort<span>schatz</span></div>
      <div class="header-right">
        <button class="level-pill" id="level-pill" onclick="toggleLevelDropdown()">
          All <span class="level-pill-arrow">▾</span>
        </button>
        <button class="fav-header-btn" id="fav-header-btn" onclick="openMyWords()">
          ♡ <span id="fav-count"></span>
        </button>
        <button class="quiz-header-btn" onclick="openQuiz()">⚡ Quiz</button>
      </div>
    </div>

    <!-- Level dropdown (positioned absolute) -->
    <div class="level-dropdown" id="level-dropdown" style="display:none">
      <div class="level-dropdown-modes">
        <button class="ldm-btn active" id="ldm-cumulative" onclick="setLevelMode('cumulative')">≤ Up to</button>
        <button class="ldm-btn" id="ldm-exact" onclick="setLevelMode('exact')">=</button>
      </div>
      <div class="level-dropdown-options">
        <button class="ldo-btn active" data-lvl="all" onclick="pickLevel('all')">All</button>
        <button class="ldo-btn A1" data-lvl="A1" onclick="pickLevel('A1')">A1</button>
        <button class="ldo-btn A2" data-lvl="A2" onclick="pickLevel('A2')">A2</button>
        <button class="ldo-btn B1" data-lvl="B1" onclick="pickLevel('B1')">B1</button>
        <button class="ldo-btn B2" data-lvl="B2" onclick="pickLevel('B2')">B2</button>
        <button class="ldo-btn C1" data-lvl="C1" onclick="pickLevel('C1')">C1</button>
        <button class="ldo-btn C2" data-lvl="C2" onclick="pickLevel('C2')">C2</button>
      </div>
    </div>

    <div class="sidebar">
      <!-- Search bar -->
      <div class="search-bar-wrap">
        <div class="search-icon">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
            <circle cx="6.5" cy="6.5" r="5" stroke="currentColor" stroke-width="1.5"/>
            <path d="M10.5 10.5L14 14" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
          </svg>
        </div>
        <input id="search-input" class="search-input" type="search"
               placeholder="Search German or English…"
               oninput="onSearch(this.value)"
               autocomplete="off" autocorrect="off" spellcheck="false">
        <button id="search-clear" class="search-clear" onclick="clearSearch()" style="display:none">✕</button>
      </div>

      <!-- Word type tabs -->
      <div class="type-tabs" id="type-tabs">
        <button class="tab verb active" onclick="switchType('verb')">Verben</button>
        <button class="tab nomen"       onclick="switchType('nomen')">Nomen</button>
        <button class="tab andere"      onclick="switchType('andere')">Andere</button>
      </div>



      <!-- Verb pattern filter -->
      <div class="ctx-filter" id="pattern-filter" style="display:none">
        <div class="ctx-dropdown-wrap">
          <button class="ctx-dropdown-btn" id="pattern-dropdown-btn" onclick="toggleCtxDropdown('pattern')">
            All patterns <span>▾</span>
          </button>
          <div class="ctx-dropdown-menu" id="pattern-dropdown-menu" style="display:none"></div>
        </div>
        <!-- Desktop pills (same div, pills shown via CSS) -->
        <div class="ctx-pills" id="pattern-pills"></div>
      </div>

      <!-- Nomen theme filter -->
      <div class="ctx-filter" id="theme-filter" style="display:none">
        <div class="ctx-dropdown-wrap">
          <button class="ctx-dropdown-btn" id="theme-dropdown-btn" onclick="toggleCtxDropdown('theme')">
            All themes <span>▾</span>
          </button>
          <div class="ctx-dropdown-menu" id="theme-dropdown-menu" style="display:none"></div>
        </div>
        <div class="ctx-pills" id="theme-pills"></div>
      </div>

<div id="word-list-panel" style="display:none"></div>
      <!-- Nav bar -->
      <div class="nav-bar" id="nav-bar" style="display:none">
        <button class="nav-arrow" id="nav-prev" onclick="navigateWord(-1)">
          <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
            <path d="M11 4L6 9L11 14" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </button>
        <div class="nav-progress-wrap">
          <div class="nav-progress-bar">
            <div class="nav-progress-fill" id="nav-progress-fill"></div>
          </div>
          <div class="nav-dots" id="nav-dots"></div>
        </div>
        <button class="nav-arrow" id="nav-next" onclick="navigateWord(1)">
          <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
            <path d="M7 4L12 9L7 14" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </button>
      </div>
    </div><!-- end .sidebar -->

    <div class="main-area">
      <!-- Search results -->
      <div id="search-results" style="display:none"></div>
      <!-- Word card -->
      <div class="card-container">
        <div id="card-area"></div>
      </div>
    </div><!-- end .main-area -->


    <!-- Level picker overlay (first-load) -->
    <div class="level-picker-overlay" id="level-picker-overlay" style="display:none">
      <div class="level-picker">
        <div class="level-picker-title">What is your level?</div>
        <div class="level-picker-sub">You can change this anytime</div>
        <div class="level-picker-grid">
          <button class="lpg-btn A1" onclick="pickInitialLevel('A1')">A1<span>Beginner</span></button>
          <button class="lpg-btn A2" onclick="pickInitialLevel('A2')">A2<span>Elementary</span></button>
          <button class="lpg-btn B1" onclick="pickInitialLevel('B1')">B1<span>Intermediate</span></button>
          <button class="lpg-btn B2" onclick="pickInitialLevel('B2')">B2<span>Upper intermediate</span></button>
          <button class="lpg-btn C1" onclick="pickInitialLevel('C1')">C1<span>Advanced</span></button>
          <button class="lpg-btn C2" onclick="pickInitialLevel('C2')">C2<span>Proficient</span></button>
        </div>
        <button class="lpg-all" onclick="pickInitialLevel('all')">Show all levels</button>
      </div>
    </div>

    <div class="mywords-overlay" id="mywords-overlay">
      <div class="mywords-panel" id="mywords-panel">
        <div class="mywords-header">
          <div class="mywords-title">My Words <span id="mywords-count"></span></div>
          <button class="mywords-close" onclick="closeMyWords()">✕</button>
        </div>
        <div id="mywords-list"></div>
        <div id="mywords-card"></div>
      </div>
    </div>

    <div class="quiz-overlay" id="quiz-overlay">
      <div class="quiz-panel">
        <div class="quiz-panel-header">
          <div class="quiz-panel-title">Quiz</div>
          <button class="quiz-close" onclick="closeQuiz()">✕</button>
        </div>
        <div id="quiz-body"></div>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
  <script src="quiz.js"></script>
</body>

</html>
